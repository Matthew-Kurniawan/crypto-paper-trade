name: Daily live signal

# Runs once per day at 01:00 UTC (= 09:00 Singapore time, ~1h after the
# daily bar closes). Also runnable manually from the Actions tab.
on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write     # to commit state changes back to the repo
  issues: write       # to open an Issue when there's an action required
  pages: write        # to deploy the dashboard to GitHub Pages
  id-token: write     # required by deploy-pages action

# Avoid concurrent deploys clobbering each other if a manual run happens
# while the cron is firing.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  run-live-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      has_flip: ${{ steps.signal.outputs.has_flip }}
      flip_summary: ${{ steps.signal.outputs.flip_summary }}
      flip_count: ${{ steps.signal.outputs.flip_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run live signal
        id: signal
        shell: bash
        run: |
          set -euo pipefail
          # Capture stdout/stderr but propagate live_signal's exit code
          python -m src.live_signal 2>&1 | tee live_signal_stdout.txt
          # Sanity-check that the run actually completed
          if [ ! -f data/processed/live/dashboard.html ]; then
            echo "::error::dashboard.html missing — live_signal did not complete"
            exit 1
          fi

          # Detect flips and emit step outputs (heredoc avoids quote-escaping hell)
          python <<'PY' >> "$GITHUB_OUTPUT"
          import pandas as pd
          df = pd.read_csv('data/processed/live/decisions_log.csv')
          today = df[df['run_ts'] == df['run_ts'].max()]
          flips = today[today['is_flip'] == 1]
          if len(flips):
              parts = []
              for _, r in flips.iterrows():
                  word = {1: 'LONG', 0: 'FLAT', -1: 'SHORT'}[int(r['current_signal'])]
                  parts.append(f"{r['asset']}: {word}")
              print("has_flip=true")
              print(f"flip_summary={'; '.join(parts)}")
              print(f"flip_count={len(flips)}")
          else:
              print("has_flip=false")
              print("flip_summary=")
              print("flip_count=0")
          PY

      - name: Commit and push state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "live: scheduled run $DATE"
            git push
          fi

      - name: Open Issue on flip
        if: steps.signal.outputs.has_flip == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const summary = process.env.FLIP_SUMMARY;
            const count = process.env.FLIP_COUNT;
            const today = new Date().toISOString().slice(0, 10);
            const dashboardUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/data/processed/live/dashboard.html`;
            const reportUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/data/processed/live/${today}.md`;
            const journalUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/data/processed/live/paper_trade_journal.csv`;
            const body = [
              `**${count} action(s) required** today.`,
              ``,
              summary,
              ``,
              `### Links`,
              `- [Today's report](${reportUrl})`,
              `- [Dashboard](${dashboardUrl}) (download and open in browser for the visual version)`,
              `- [Paper trade journal](${journalUrl})`,
              ``,
              `_Auto-generated by the daily-live-signal workflow. Close this issue once you've executed the paper trade in your journal._`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Action required ${today} — ${summary}`,
              body: body,
              labels: ['live-signal', 'action-required'],
            });
        env:
          FLIP_SUMMARY: ${{ steps.signal.outputs.flip_summary }}
          FLIP_COUNT: ${{ steps.signal.outputs.flip_count }}

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-signal-${{ github.run_id }}
          path: |
            data/processed/live/
            live_signal_stdout.txt
          retention-days: 30

      # ---- Build the static site for GitHub Pages ----
      # The dashboard becomes the homepage. Daily reports, journal, state
      # are accessible at predictable paths so you can deep-link from phone.
      - name: Build _site for GitHub Pages
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          cp data/processed/live/dashboard.html _site/index.html
          # Daily reports + JSON snapshots + journal + decisions log + state
          cp data/processed/live/*.md _site/ 2>/dev/null || true
          cp data/processed/live/*.json _site/ 2>/dev/null || true
          cp data/processed/live/*.csv _site/ 2>/dev/null || true
          # A tiny info page that lists everything available
          cat > _site/about.html <<'HTML'
          <!DOCTYPE html><html><head><meta charset="utf-8"><title>About</title>
          <style>body{font-family:-apple-system,sans-serif;max-width:700px;margin:2em auto;padding:0 1em;line-height:1.5}</style>
          </head><body>
          <h1>Crypto paper-trade dashboard</h1>
          <p>Auto-generated daily by the <code>daily_live_signal.yml</code> GitHub Actions workflow.</p>
          <ul>
            <li><a href="./">Dashboard (homepage)</a></li>
            <li><a href="./paper_trade_journal.csv">Paper trade journal (CSV)</a></li>
            <li><a href="./decisions_log.csv">Decisions log (CSV)</a></li>
            <li><a href="./state.json">Current state (JSON)</a></li>
          </ul>
          <p>Source: <a href="https://github.com/Matthew-Kurniawan/crypto-paper-trade">github.com/Matthew-Kurniawan/crypto-paper-trade</a></p>
          </body></html>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy-pages:
    needs: run-live-signal
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
